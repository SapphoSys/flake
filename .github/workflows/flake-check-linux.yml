name: Flake Check - Linux

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  flake-check:
    name: Check flake on Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Lix
        uses: samueldr/lix-gha-installer-action@8dc19fbd6451fa106a68ecb2dafeeeb90dff3a29
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Check NixOS configurations
        shell: bash
        run: |
          configs="$(nix eval --raw --apply 'configs: builtins.concatStringsSep "\n" (builtins.attrNames configs)' .#nixosConfigurations)"

          if [ -z "$configs" ]; then
            echo "No NixOS configurations to check."
            exit 0
          fi

          while IFS= read -r config; do
            [ -n "$config" ] || continue

            echo "checking nixosConfigurations.${config}.config.system.build.toplevel.drvPath"
            nix eval ".#nixosConfigurations.\"${config}\".config.system.build.toplevel.drvPath"
          done <<< "$configs"
