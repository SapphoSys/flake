name: Flake Check - Darwin

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  flake-check:
    name: Check flake on macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # @v6.0.2

      - name: Install Lix
        uses: samueldr/lix-gha-installer-action@8dc19fbd6451fa106a68ecb2dafeeeb90dff3a29
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Check Darwin configurations
        shell: bash
        run: |
          configs="$(nix eval --raw --apply 'configs: builtins.concatStringsSep "\n" (builtins.attrNames configs)' .#darwinConfigurations)"

          if [ -z "$configs" ]; then
            echo "No Darwin configurations to check."
            exit 0
          fi

          while IFS= read -r config; do
            [ -n "$config" ] || continue

            echo "checking darwinConfigurations.${config}.system.drvPath"
            nix eval ".#darwinConfigurations.\"${config}\".system.drvPath"
          done <<< "$configs"
